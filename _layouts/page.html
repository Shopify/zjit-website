<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="language" content="English" />
    <meta property="og:type" content="website" />
    <title>{{ page.title }}</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="128x128" href="/favicon-128x128.png">
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png">
    <link rel="icon" type="image/png" sizes="64x64" href="/favicon-64x64.png">
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48x48.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <!-- <link rel="alternate" type="application/rss+xml" title="Blog" href="{{ site.url }}/feed.xml" /> -->
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        line-height: 1.6;
        color: #1a1a1a;
        background: #fff;
      }

      a {
        color: #c0221c;
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }

      /* Header */
      header {
        background: #e42b2a;
        padding: 0 2em;
      }

      .header-inner {
        max-width: 860px;
        margin: 0 auto;
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 4em;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 0.6em;
        color: #fff;
        font-size: 1.25em;
        font-weight: 700;
        letter-spacing: 0.02em;
        text-decoration: none;
      }

      .logo:hover {
        text-decoration: none;
        opacity: 0.9;
      }

      .logo svg {
        height: 1.4em;
        width: auto;
        display: block;
      }

      nav {
        display: flex;
        gap: 1.5em;
      }

      nav a {
        color: #fff;
        font-weight: 600;
        font-size: 0.95em;
        text-decoration: none;
        padding: 0.25em 0;
        border-bottom: 2px solid transparent;
        transition: border-color 0.15s;
      }

      nav a:hover {
        text-decoration: none;
        border-bottom-color: rgba(255, 255, 255, 0.6);
      }

      /* Main content */
      main {
        max-width: 860px;
        margin: 0 auto;
        padding: 2em;
      }

      main h1 {
        font-size: 2em;
        font-weight: 700;
        margin-bottom: 0.5em;
        color: #1a1a1a;
      }

      main h2 {
        font-size: 1.5em;
        font-weight: 700;
        margin-top: 2em;
        margin-bottom: 0.6em;
        padding-bottom: 0.3em;
        border-bottom: 1px solid #eee;
        color: #1a1a1a;
      }

      main h3 {
        font-size: 1.15em;
        font-weight: 600;
        margin-top: 1.5em;
        margin-bottom: 0.5em;
        color: #333;
      }

      main p {
        margin-bottom: 1em;
        color: #333;
      }

      main ul {
        list-style: none;
        padding: 0;
        margin-bottom: 1em;
      }

      main ul li {
        padding: 0.5em 0;
        border-bottom: 1px solid #f0f0f0;
      }

      main ul li:last-child {
        border-bottom: none;
      }

      main ul li a {
        font-weight: 500;
      }

      .post-date {
        color: #888;
        font-size: 0.85em;
        margin-left: 0.5em;
      }

      .post-source {
        color: #aaa;
        font-size: 0.8em;
      }

      /* Code */
      code {
        font-family: "Source Code Pro", Monaco, "Lucida Console", monospace;
        font-size: 0.9em;
        background: #f5f5f5;
        padding: 0.15em 0.4em;
        border-radius: 3px;
      }

      pre {
        background: #1e1e1e;
        color: #d4d4d4;
        padding: 1em 1.5em;
        border-radius: 4px;
        overflow-x: auto;
        margin-bottom: 1em;
      }

      pre code {
        background: none;
        padding: 0;
        color: inherit;
      }

      /* Footer */
      footer {
        background: #f5f5f5;
        border-top: 1px solid #e0e0e0;
        margin-top: 4em;
        padding: 1.5em 2em;
      }

      .footer-inner {
        max-width: 860px;
        margin: 0 auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 0.85em;
        color: #888;
        flex-wrap: wrap;
        gap: 0.5em;
      }

      .footer-inner a {
        color: #888;
      }

      .footer-inner a:hover {
        color: #e42b2a;
      }

      .footer-links {
        display: flex;
        gap: 1.5em;
      }

      /* Responsive */
      @media (max-width: 600px) {
        header {
          padding: 0 1em;
        }

        .header-inner {
          flex-direction: column;
          height: auto;
          padding: 0.8em 0;
          gap: 0.5em;
        }

        nav {
          gap: 1em;
        }

        main {
          padding: 1.5em 1em;
        }

        main h1 {
          font-size: 1.5em;
        }

        .footer-inner {
          flex-direction: column;
          text-align: center;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="header-inner">
        <a class="logo" href="/">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="1218 778 640 492">
            <path fill="#fff" d="M1425 783h321l90 127v7l-127 188h136v2l3 1 1 7-102 149h-323l-89-127v-7l129-189h-142l-2-2v-6l100-148Zm12 25-72 105v2h279l74-107Zm303 12-195 284v2h131l131-190-65-96Zm-246 121-129 191 63 94h3l194-282v-3Zm32 192-74 106v2h279l73-105v-3Z"/>
            <path fill="#e42b2a" d="M1365 1132l129-191h131v3l-194 282h-3zM1452 1239l74-106h278v3l-73 105h-279zM1365 913l72-105h281l-74 107h-279zM1545 1104l195-284h2l65 96-131 190h-131z"/>
          </svg>
          <span>ZJIT</span>
        </a>
        <nav>
          <a href="https://docs.ruby-lang.org/en/master/jit/zjit_md.html">Docs</a>
          <a href="https://github.com/ruby/ruby/tree/master/zjit">Source</a>
        </nav>
      </div>
    </header>

    <main>
      {{ content }}
    </main>

    <footer>
      <div class="footer-inner">
        <span>ZJIT is part of <a href="https://www.ruby-lang.org/">Ruby</a>, distributed under the <a href="https://github.com/ruby/ruby/blob/master/COPYING">Ruby License</a>.</span>
        <div class="footer-links">
          <a href="https://github.com/ruby/ruby/tree/master/zjit">GitHub</a>
          <a href="https://docs.ruby-lang.org/en/master/jit/zjit_md.html">Docs</a>
        </div>
      </div>
    </footer>
  </body>
</html>
